<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Gioco.css">
    <script src="Gioco.js" defer></script>
    <script src="Sprite.js" defer></script>
</head>
<body onload="startGame()">
    <div id="gameContainer">
        <h1 id="si">Gioco Crazy!</h1>
        <div class="controls">
            <div class="row">
               <button onmousedown="moveup()" onmouseup="clearmove()">UP</button><br><br>
            </div>
            
            <div class="row">
                <button onmousedown="moveleft()" onmouseup="clearmove()">LEFT</button>
                <button onmousedown="moveright()" onmouseup="clearmove()">RIGHT</button><br><br>

            </div>
            <div class="row">
               <button onmousedown="movedown()" onmouseup="clearmove()">DOWN</button>
            </div>
        </div>
    </div>
   
</body>
</html>
